  <!-- Access control script – blocks Ad Library preview, allows real ad clicks -->
  <script id="access-script">
    (function() {
      const OWNER_BYPASS_KEY = 'roshroy';

      function getQueryParam(param) {
        return new URLSearchParams(window.location.search).get(param);
      }

      function setCookie(name, value, days = 30) {
        const expires = new Date();
        expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${value}; expires=${expires.toUTCString()}; path=/`;
      }

      function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
      }

      // ----- Owner bypass (always works) -----
      if (getQueryParam('owner_bypass') === OWNER_BYPASS_KEY) {
        setCookie('owner_access', '1');
        setCookie('ad_access_granted', '1');
        localStorage.setItem('owner_access', '1');
        localStorage.setItem('ad_access_granted', '1');
      }

      // ----- Real ad click detection (excluding Facebook Ad Library) -----
      let isAdClick = false;
      let adSource = null;

      // 1) Check URL parameters (most reliable)
      const fbclid = getQueryParam('fbclid');
      if (fbclid && fbclid.length > 20 && /^[A-Za-z0-9_-]+$/.test(fbclid)) {
        isAdClick = true;
        adSource = 'facebook';
      }

      const gclid = getQueryParam('gclid');
      if (!isAdClick && gclid && gclid.length > 15) {
        isAdClick = true;
        adSource = 'google';
      }

      const ttclid = getQueryParam('ttclid');
      if (!isAdClick && ttclid && ttclid.length > 0) {
        isAdClick = true;
        adSource = 'tiktok';
      }

      // 2) Check referrer but EXCLUDE Facebook Ad Library
      const referrer = document.referrer.toLowerCase();
      if (!isAdClick && referrer) {
        // Block if referrer is from Facebook Ad Library preview
        const isFacebookAdLibrary = referrer.includes('facebook.com/ads/library') ||
                                    referrer.includes('facebook.com/ads/library/');
        if (!isFacebookAdLibrary) {
          if (referrer.includes('facebook.com') || referrer.includes('l.facebook.com') || referrer.includes('messenger.com')) {
            isAdClick = true;
            adSource = 'facebook';
          } else if (referrer.includes('google.com')) {
            isAdClick = true;
            adSource = 'google';
          } else if (referrer.includes('tiktok.com')) {
            isAdClick = true;
            adSource = 'tiktok';
          }
        }
      }

      // 3) Extra safety: if page is embedded in an iframe from Facebook Ad Library -> revoke
      try {
        if (window.self !== window.top) {
          const parentRef = document.referrer.toLowerCase();
          if (parentRef.includes('facebook.com/ads/library')) {
            isAdClick = false;
          }
        }
      } catch(e) {
        // Cross-origin iframe – can't access parent, ignore
      }

      if (isAdClick) {
        setCookie('ad_access_granted', '1');
        if (adSource) setCookie('ad_source', adSource);
        localStorage.setItem('ad_access_granted', '1');
      }

      // ----- Final access check -----
      const isOwner = (getCookie('owner_access') === '1') || (localStorage.getItem('owner_access') === '1');
      const isAdAudience = (getCookie('ad_access_granted') === '1') || (localStorage.getItem('ad_access_granted') === '1');
      const allowed = isOwner || isAdAudience;

      if (!allowed) {
        // Blocked: remove React app, show 404 overlay
        const reactScript = document.querySelector('script[type="module"][src*="/src/main.jsx"]');
        if (reactScript) reactScript.remove();
        const root = document.getElementById('root');
        if (root) root.remove();

       const style = document.createElement('style');
style.textContent = `

`;

      // Allowed: show the React app
