<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/wr6TgJHd/org-chromium-webapk-a83f8ed661b7a33d4-v2-1.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dryfruit Store</title>

  <!-- Facebook Pixel Code -->
  <script>
    !(function (f, b, e, v, n, t, s) {
      if (f.fbq) return;
      n = f.fbq = function () {
        n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
      };
      if (!f._fbq) f._fbq = n;
      n.push = n;
      n.loaded = !0;
      n.version = "2.0";
      n.queue = [];
      t = b.createElement(e);
      t.async = !0;
      t.src = v;
      s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s);
    })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");
    fbq("init", "1546893476399130");
    fbq("track", "PageView");
  </script>
  <noscript>
    <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1546893476399130&ev=PageView&noscript=1" />
  </noscript>

  <style>
    /* Hide the entire page content initially to avoid flicker */
    body > *:not(#access-script) {
      display: none;
    }
    #access-script {
      display: none;
    }
  </style>
</head>
<body>
  <!-- React mount point (will be shown only if allowed) -->
  <div id="root"></div>
  <!-- React entry script (Vite default path) - KEPT EXACTLY THE SAME -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Access control script – blocks Facebook Ad Library previews, allows real ad clicks -->
  <script id="access-script">
    (function() {
      const OWNER_BYPASS_KEY = 'roshroy';

      function getQueryParam(param) {
        return new URLSearchParams(window.location.search).get(param);
      }

      function setCookie(name, value, days = 30) {
        const expires = new Date();
        expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${value}; expires=${expires.toUTCString()}; path=/`;
      }

      function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
      }

      // ----- Owner bypass (always works) -----
      if (getQueryParam('owner_bypass') === OWNER_BYPASS_KEY) {
        setCookie('owner_access', '1');
        setCookie('ad_access_granted', '1');
        localStorage.setItem('owner_access', '1');
        localStorage.setItem('ad_access_granted', '1');
      }

      // ----- DETECT AND BLOCK FACEBOOK AD LIBRARY PREVIEWS -----
      let isAdClick = false;
      let adSource = null;
      let isFromAdLibrary = false;

      // 1) Check referrer FIRST - detect Facebook Ad Library
      const referrer = document.referrer ? document.referrer.toLowerCase() : '';
      
      // CRITICAL: Block if referrer is from Facebook Ad Library
      if (referrer.includes('facebook.com/ads/library') || 
          referrer.includes('facebook.com/ads/library/') ||
          referrer.includes('business.facebook.com/ads/library') ||
          (referrer.includes('ads/library') && referrer.includes('facebook.com'))) {
        isFromAdLibrary = true;
      }

      // 2) Check if page is embedded in iframe from Ad Library
      try {
        if (window.self !== window.top) {
          const parentRef = document.referrer.toLowerCase();
          if (parentRef.includes('facebook.com/ads/library') || parentRef.includes('ads/library')) {
            isFromAdLibrary = true;
          }
        }
      } catch(e) {
        // Cross-origin iframe - cannot access parent, check referrer again
        if (referrer.includes('facebook.com/ads/library')) {
          isFromAdLibrary = true;
        }
      }

      // 3) Check for Meta crawler without valid ad parameters (Ad Library preview bot)
      const userAgent = navigator.userAgent.toLowerCase();
      const isMetaCrawler = userAgent.includes('facebookexternalhit') || 
                            userAgent.includes('facebot') ||
                            userAgent.includes('meta-externalagent');
      
      const fbclid = getQueryParam('fbclid');
      const hasValidFbclid = fbclid && fbclid.length > 20 && /^[A-Za-z0-9_-]+$/.test(fbclid);
      
      // If Meta crawler WITHOUT valid fbclid → likely Ad Library preview
      if (isMetaCrawler && !hasValidFbclid && !isFromAdLibrary) {
        isFromAdLibrary = true;
      }

      // 4) Check URL parameters for real ad clicks (ONLY if NOT from Ad Library)
      if (!isFromAdLibrary) {
        const fbclid = getQueryParam('fbclid');
        if (fbclid && fbclid.length > 20 && /^[A-Za-z0-9_-]+$/.test(fbclid)) {
          isAdClick = true;
          adSource = 'facebook';
        }

        const gclid = getQueryParam('gclid');
        if (!isAdClick && gclid && gclid.length > 15) {
          isAdClick = true;
          adSource = 'google';
        }

        const ttclid = getQueryParam('ttclid');
        if (!isAdClick && ttclid && ttclid.length > 0) {
          isAdClick = true;
          adSource = 'tiktok';
        }

        // 5) Check referrer for real ad clicks (EXCLUDING Ad Library)
        if (!isAdClick && referrer) {
          // Already excluded Ad Library above, so safe to check
          if (referrer.includes('facebook.com') || referrer.includes('l.facebook.com') || referrer.includes('messenger.com')) {
            isAdClick = true;
            adSource = 'facebook';
          } else if (referrer.includes('google.com')) {
            isAdClick = true;
            adSource = 'google';
          } else if (referrer.includes('tiktok.com')) {
            isAdClick = true;
            adSource = 'tiktok';
          }
        }
      }

      // Grant access for real ad clicks (only if NOT from Ad Library)
      if (isAdClick && !isFromAdLibrary) {
        setCookie('ad_access_granted', '1');
        if (adSource) setCookie('ad_source', adSource);
        localStorage.setItem('ad_access_granted', '1');
      }

      // ----- FINAL ACCESS CHECK -----
      const isOwner = (getCookie('owner_access') === '1') || (localStorage.getItem('owner_access') === '1');
      const isAdAudience = (getCookie('ad_access_granted') === '1') || (localStorage.getItem('ad_access_granted') === '1');
      
      // BLOCK if from Ad Library preview, otherwise allow if owner or ad audience
      const allowed = !isFromAdLibrary && (isOwner || isAdAudience);

      if (!allowed) {
        // Blocked: remove React app, show 404 overlay
        const reactScript = document.querySelector('script[type="module"][src*="/src/main.jsx"]');
        if (reactScript) reactScript.remove();
        const root = document.getElementById('root');
        if (root) root.remove();

        const overlay = document.createElement('div');
        overlay.id = 'access-denied-overlay';
        overlay.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          display: flex;
          justify-content: center;
          align-items: center;
          color: white;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          z-index: 10000;
        `;
        overlay.innerHTML = `
          <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 60px 40px; text-align: center; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);">
            <div style="font-size: 64px; margin-bottom: 30px;">🔒</div>
            <div style="font-size: 120px; font-weight: 800; margin-bottom: 20px;">404</div>
            <h1 style="font-size: 32px; margin-bottom: 20px;">Page Not Found</h1>
            <p style="font-size: 18px; line-height: 1.6; opacity: 0.9;">The page you are looking for could not be found.<br>Please check the URL or contact support.</p>
          </div>
        `;
        document.body.appendChild(overlay);
        // Remove the initial hide-all style so overlay is visible
        const style = document.querySelector('style');
        if (style) style.remove();
        return;
      }

      // Allowed: show the React app
      const root = document.getElementById('root');
      if (root) root.style.display = '';
      // Remove the initial hide-all style
      const style = document.querySelector('style');
      if (style) style.remove();
      
      console.log('Access granted – loading Dryfruit Store');
    })();
  </script>
</body>
</html>
