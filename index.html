<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/wr6TgJHd/org-chromium-webapk-a83f8ed661b7a33d4-v2-1.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dryfruit Store</title>

    <!-- Facebook Pixel Code -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        "script",
        "https://connect.facebook.net/en_US/fbevents.js"
      );
      fbq("init", "1474635113904644");
      fbq("track", "PageView");
    </script>
    <noscript>
      <img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=1474635113904644&ev=PageView&noscript=1"
      />
    </noscript>

    <!-- ================================================= -->
    <!-- ACCESS CONTROL – BLOCK UNAUTHORIZED USERS        -->
    <!-- ================================================= -->
    <style id="blocker-style">
      /* This style will be removed if user is allowed */
      #root, script[src*="/src/main.jsx"] {
        display: none !important;
      }
      .access-denied-404 {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .access-denied-404 .error-container {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 60px 40px;
        text-align: center;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.2);
      }
      .access-denied-404 .error-code { font-size: 120px; font-weight: 800; margin-bottom: 20px; line-height: 1; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
      .access-denied-404 .error-title { font-size: 32px; font-weight: 600; margin-bottom: 20px; }
      .access-denied-404 .error-message { font-size: 18px; line-height: 1.6; margin-bottom: 30px; opacity: 0.9; }
      .access-denied-404 .error-icon { font-size: 64px; margin-bottom: 30px; display: block; }
      @media (max-width:600px){
        .access-denied-404 .error-container { padding: 40px 20px; }
        .access-denied-404 .error-code { font-size: 80px; }
        .access-denied-404 .error-title { font-size: 24px; }
        .access-denied-404 .error-message { font-size: 16px; }
      }
    </style>

    <script>
      (function() {
        const OWNER_BYPASS_KEY = 'roshroy';

        function getQueryParam(param) {
          return new URLSearchParams(window.location.search).get(param);
        }

        function setCookie(name, value, days = 30) {
          const expires = new Date();
          expires.setTime(expires.getTime() + days * 24 * 60 * 60 * 1000);
          document.cookie = `${name}=${value}; expires=${expires.toUTCString()}; path=/`;
        }

        function getCookie(name) {
          const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
          return match ? match[2] : null;
        }

        // Owner detection
        if (getQueryParam('owner_bypass') === OWNER_BYPASS_KEY) {
          setCookie('owner_access', '1');
          setCookie('ad_access_granted', '1');
          localStorage.setItem('owner_access', '1');
          localStorage.setItem('ad_access_granted', '1');
        }

        // Real ad click detection
        let isAdClick = false;
        let adSource = null;

        const fbclid = getQueryParam('fbclid');
        if (fbclid && fbclid.length > 20 && /^[A-Za-z0-9_-]+$/.test(fbclid)) {
          isAdClick = true;
          adSource = 'facebook';
        }

        const gclid = getQueryParam('gclid');
        if (!isAdClick && gclid && gclid.length > 15) {
          isAdClick = true;
          adSource = 'google';
        }

        const ttclid = getQueryParam('ttclid');
        if (!isAdClick && ttclid && ttclid.length > 0) {
          isAdClick = true;
          adSource = 'tiktok';
        }

        const referrer = document.referrer.toLowerCase();
        if (!isAdClick && referrer) {
          if (referrer.includes('facebook.com') || referrer.includes('l.facebook.com') || referrer.includes('messenger.com')) {
            isAdClick = true;
            adSource = 'facebook';
          } else if (referrer.includes('google.com')) {
            isAdClick = true;
            adSource = 'google';
          } else if (referrer.includes('tiktok.com')) {
            isAdClick = true;
            adSource = 'tiktok';
          }
        }

        if (isAdClick) {
          setCookie('ad_access_granted', '1');
          if (adSource) setCookie('ad_source', adSource);
          localStorage.setItem('ad_access_granted', '1');
        }

        // Final access check
        const isOwner = (getCookie('owner_access') === '1') || (localStorage.getItem('owner_access') === '1');
        const isAdAudience = (getCookie('ad_access_granted') === '1') || (localStorage.getItem('ad_access_granted') === '1');
        const allowed = isOwner || isAdAudience;

        if (!allowed) {
          // Block access: remove the blocking style and show 404 overlay
          const style = document.getElementById('blocker-style');
          if (style) style.remove();

          // Create 404 overlay
          const overlay = document.createElement('div');
          overlay.className = 'access-denied-404';
          overlay.innerHTML = `
            <div class="error-container">
              <div class="error-icon">🔒</div>
              <div class="error-code">404</div>
              <h1 class="error-title">Page Not Found</h1>
              <p class="error-message">
                The page you are looking for could not be found.<br>
                Please check the URL or contact support.
              </p>
            </div>
          `;
          document.body.appendChild(overlay);

          // Also hide the original #root and React script visually
          const root = document.getElementById('root');
          if (root) root.style.display = 'none';
          const scripts = document.querySelectorAll('script[src*="/src/main.jsx"]');
          scripts.forEach(s => s.style.display = 'none');
        } else {
          // Allowed: remove the blocking style so #root becomes visible
          const style = document.getElementById('blocker-style');
          if (style) style.remove();
          // Ensure #root is visible (in case it was hidden by the style)
          const root = document.getElementById('root');
          if (root) root.style.display = '';
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
